name: Flow Auto Message

on:
  schedule:
    - cron: '0 5 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests

      - name: 오후 2시 메시지
        if: github.event.schedule == '0 5 * * 1-5' || github.event_name == 'workflow_dispatch'
        env:
          FLOW_EMAIL: ${{ secrets.FLOW_EMAIL }}
          FLOW_PASSWORD: ${{ secrets.FLOW_PASSWORD }}
          FLOW_ROOM_SRNO: "22912778"
          FLOW_MESSAGE: "테스트123"
        run: python send_message.py

      - name: 오후 4시 메시지
        if: github.event.schedule == '0 7 * * 1-5'
        env:
          FLOW_EMAIL: ${{ secrets.FLOW_EMAIL }}
          FLOW_PASSWORD: ${{ secrets.FLOW_PASSWORD }}
          FLOW_ROOM_SRNO: "22912778"
          FLOW_MESSAGE: "test123test123"
        run: python send_message.py
